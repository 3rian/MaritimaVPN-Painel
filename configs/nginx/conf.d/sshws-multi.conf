map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream sshws_backend {
    server 127.0.0.1:8880;
}

# Managed by Marítima VPN panel
# HTTP ports:  80 8080
# HTTPS ports: 443 8443

server {
    listen 80;
    server_name maritimavpn.shop ws.maritimavpn.shop;

    location / {
        proxy_pass http://sshws_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }
}

server {
    listen 8080;
    server_name maritimavpn.shop ws.maritimavpn.shop;

    location / {
        proxy_pass http://sshws_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }
}

server {
    listen 443 ssl http2;
    server_name maritimavpn.shop ws.maritimavpn.shop;

    ssl_certificate /etc/letsencrypt/live/maritimavpn.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maritimavpn.shop/privkey.pem;

    location / {
        proxy_pass http://sshws_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }
}

server {
    listen 8443 ssl http2;
    server_name maritimavpn.shop ws.maritimavpn.shop;

    ssl_certificate /etc/letsencrypt/live/maritimavpn.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maritimavpn.shop/privkey.pem;

    location / {
        proxy_pass http://sshws_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }
}


